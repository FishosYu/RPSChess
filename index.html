<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>RPS CHESS</title>
  <style>
    @font-face {
      font-family: 'Zpix';
      src: url('./assets/zpix.ttf') format('truetype');
      font-display: swap;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      position: fixed;
      inset: 0;
      touch-action: none;
      background: #1a1625;
    }
    #game-container {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      touch-action: none;
      outline: none;
    }
    @media (min-width: 720px) and (min-height: 560px) {
      body {
        display: grid;
        place-items: center;
        padding: 16px 24px;
        background:
          radial-gradient(circle at 18% 12%, rgba(232, 168, 56, 0.18), transparent 28%),
          radial-gradient(circle at 82% 88%, rgba(74, 126, 184, 0.16), transparent 30%),
          linear-gradient(135deg, #100e18 0%, #1b1630 48%, #0d0b13 100%);
      }
      #game-container {
        width: min(520px, calc(100vw - 48px), calc((100vh - 32px) * 0.5625));
        height: min(980px, calc(100vh - 32px), calc((100vw - 48px) * 1.8846));
        border: 10px solid #2a2338;
        border-radius: 32px;
        background: #1a1625;
        box-shadow:
          0 26px 70px rgba(0, 0, 0, 0.42),
          0 0 0 1px rgba(255, 255, 255, 0.08),
          inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      }
    }
    canvas { display: block; }
    #language-toggle {
      position: absolute;
      right: max(12px, env(safe-area-inset-right));
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 3000;
      min-width: 44px;
      height: 32px;
      padding: 0 10px;
      border: 1px solid rgba(232, 168, 56, 0.65);
      border-radius: 999px;
      background: rgba(26, 22, 37, 0.86);
      color: #f5c800;
      cursor: pointer;
      font: 700 12px/1 Zpix, "Courier New", monospace;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.32);
    }
    #language-toggle:hover {
      background: rgba(37, 32, 51, 0.96);
    }
    #loading-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #1a1625; display: flex; flex-direction: column;
      justify-content: center; align-items: center; color: #e8a838;
      font-family: Zpix, "Press Start 2P", monospace; z-index: 2000; transition: opacity 0.3s;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; visibility: hidden; }
    .loading-spinner {
      width: 40px; height: 40px; border: 3px solid rgba(91,48,0,0.2);
      border-top-color: #f5c800; border-radius: 50%;
      animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script defer src="./rpschess.bundle.js"></script>
</head>
<body tabindex="0">
  <div id="game-container" tabindex="0">
    <div id="loading-screen">
      <div class="loading-spinner"></div>
      <div>加载拳力的游戏…</div>
    </div>
    <button id="language-toggle" type="button" aria-label="切换语言">中 / EN</button>
  </div>
  <script>
    (function () {
      var key = 'i18n-locale';
      var btn = document.getElementById('language-toggle');
      if (!btn) return;
      function currentLocale() {
        var stored = localStorage.getItem(key);
        if (stored === 'zh' || stored === 'en') return stored;
        return (navigator.language || '').toLowerCase().startsWith('en') ? 'en' : 'zh';
      }
      function syncLabel() {
        var locale = currentLocale();
        btn.textContent = locale === 'zh' ? 'EN' : '中';
        btn.title = locale === 'zh' ? 'Switch to English' : '切换到中文';
      }
      btn.addEventListener('click', function (event) {
        event.stopPropagation();
        localStorage.setItem(key, currentLocale() === 'zh' ? 'en' : 'zh');
        window.location.reload();
      });
      syncLabel();
    })();
    window.addEventListener('load', () => document.body.focus());
    document.addEventListener('click', () => document.body.focus());
  </script>
</body>
</html>
